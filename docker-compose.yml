services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    container_name: pedmin-lavalink
    restart: unless-stopped
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
    ports:
      - "2333:2333"
    environment:
      - _JAVA_OPTIONS=-Xmx512m

  bot:
    build: .
    container_name: pedmin-bot
    restart: unless-stopped
    depends_on:
      - lavalink
    env_file:
      - .env
    environment:
      - LAVALINK_HOST=lavalink:2333
    volumes:
      - ./data:/app/data
